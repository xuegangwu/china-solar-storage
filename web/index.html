<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="光储投资地图 - 全球领先的光伏储能投资分析平台">
    <meta name="theme-color" content="#667eea">
    <title>光储投资地图 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .auth-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .auth-body {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }
        
        .auth-footer p {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .alert-error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }
        
        .alert-success {
            background: #efe;
            color: #0a0;
            border: 1px solid #cfc;
        }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            color: #999;
            font-size: 14px;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: #e0e0e0;
            z-index: 0;
        }
        
        .divider span {
            position: relative;
            z-index: 1;
            background: white;
            padding: 0 16px;
        }
        
        /* 响应式优化 */
        @media (max-width: 768px) {
            .auth-container {
                border-radius: 16px;
            }
            
            .auth-header {
                padding: 30px 20px;
            }
            
            .logo {
                font-size: 56px;
            }
            
            .auth-header h1 {
                font-size: 24px;
            }
            
            .auth-body {
                padding: 30px 20px;
            }
        }
        
        @media (max-width: 375px) {
            .logo {
                font-size: 48px;
            }
            
            .auth-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">🗺️</div>
            <h1>光储投资地图</h1>
            <p>全球领先的光伏储能投资分析平台</p>
        </div>
        
        <div class="auth-body">
            <div id="alert-container"></div>
            
            <!-- 登录表单 -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">邮箱</label>
                    <input type="email" id="login-email" name="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" name="password" required placeholder="请输入密码" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary">🚀 登录</button>
            </form>
            
            <div class="divider"><span>或</span></div>
            
            <button class="btn-primary" onclick="showRegister()" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                📝 注册账号
            </button>
            
            <div class="auth-footer">
                <p>还没有账号？<a onclick="showRegister()">立即注册</a></p>
                <p style="margin-top: 16px; font-size: 13px; color: #999;">
                    登录即代表您同意我们的
                    <a href="#" style="text-decoration: underline;">服务条款</a>
                    和
                    <a href="#" style="text-decoration: underline;">隐私政策</a>
                </p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import apiService from './js/api-service.js';
        
        // 显示警告
        function showAlert(message, type = 'error') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
            
            // 3 秒后自动消失
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
        
        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await apiService.login(email, password);
                
                if (response.success) {
                    showAlert('登录成功！正在跳转...', 'success');
                    
                    // 保存用户信息
                    localStorage.setItem('user', JSON.stringify(response.data.user));
                    
                    // 延迟跳转
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            } catch (error) {
                showAlert(error.message || '登录失败，请检查邮箱和密码');
            }
        });
        
        // 切换到注册页面
        window.showRegister = function() {
            // 创建注册表单
            const authBody = document.querySelector('.auth-body');
            authBody.innerHTML = `
                <div id="alert-container"></div>
                
                <form id="register-form">
                    <div class="form-group">
                        <label for="register-name">姓名</label>
                        <input type="text" id="register-name" name="name" required placeholder="您的姓名" autocomplete="name">
                    </div>
                    
                    <div class="form-group">
                        <label for="register-email">邮箱</label>
                        <input type="email" id="register-email" name="email" required placeholder="your@email.com" autocomplete="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="register-password">密码</label>
                        <input type="password" id="register-password" name="password" required placeholder="至少 6 位密码" autocomplete="new-password" minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="register-confirm">确认密码</label>
                        <input type="password" id="register-confirm" name="confirm" required placeholder="再次输入密码" autocomplete="new-password">
                    </div>
                    
                    <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">📝 注册账号</button>
                </form>
                
                <div class="auth-footer">
                    <p>已有账号？<a onclick="showLogin()">立即登录</a></p>
                </div>
            `;
            
            // 绑定注册表单提交
            document.getElementById('register-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const name = document.getElementById('register-name').value;
                const email = document.getElementById('register-email').value;
                const password = document.getElementById('register-password').value;
                const confirm = document.getElementById('register-confirm').value;
                
                // 验证密码
                if (password !== confirm) {
                    showAlert('两次输入的密码不一致');
                    return;
                }
                
                if (password.length < 6) {
                    showAlert('密码至少需要 6 位');
                    return;
                }
                
                try {
                    const response = await apiService.register(email, password, name);
                    
                    if (response.success) {
                        showAlert('注册成功！正在跳转...', 'success');
                        
                        // 保存用户信息
                        localStorage.setItem('user', JSON.stringify(response.data.user));
                        
                        // 延迟跳转
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }
                } catch (error) {
                    showAlert(error.message || '注册失败，请稍后重试');
                }
            });
        };
        
        // 切换到登录页面
        window.showLogin = function() {
            location.reload();
        };
        
        // 检查是否已登录
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
