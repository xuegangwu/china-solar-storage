<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 光储电站投资地图</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #888;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        
        .checkbox-group label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }
        
        .forgot-password {
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            color: #888;
            font-size: 13px;
            position: relative;
        }
        
        .quick-login {
            background: #f9fafb;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .quick-login-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .quick-login-users {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        
        .quick-user {
            padding: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .quick-user:hover {
            border-color: #667eea;
            background: #667eea15;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .alert-error {
            background: #fff1f0;
            color: #ff4d4f;
            border: 1px solid #ffccc7;
        }
        
        .alert-success {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🌞</div>
            <h1 class="login-title">光储电站投资地图</h1>
            <p class="login-subtitle">v0.5 专业版 - 用户登录</p>
        </div>
        
        <div id="alert-box" class="alert"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            
            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">记住我</label>
                </div>
                <a class="forgot-password" onclick="showAlert('请联系管理员重置密码', 'error')">忘记密码？</a>
            </div>
            
            <button type="submit" class="btn-login">登 录</button>
        </form>
        
        <div class="quick-login">
            <div class="quick-login-title">快速登录（演示账号）</div>
            <div class="quick-login-users">
                <div class="quick-user" onclick="quickLogin('admin', 'admin123')">
                    👤 管理员
                </div>
                <div class="quick-user" onclick="quickLogin('terry', 'terry123')">
                    👨‍💼 Terry
                </div>
                <div class="quick-user" onclick="quickLogin('user', 'user123')">
                    👤 普通用户
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 光储电站投资地图系统</p>
            <p>内部使用 · 请勿外传</p>
        </div>
    </div>
    
    <script>
        // 模拟用户数据库（实际应使用后端 API）
        const USERS = {
            'admin': { password: 'admin123', role: 'admin', name: '系统管理员' },
            'terry': { password: 'terry123', role: 'admin', name: '伍学纲' },
            'user': { password: 'user123', role: 'user', name: '普通用户' },
            'viewer': { password: 'viewer123', role: 'viewer', name: '访客' }
        };
        
        // 显示提示信息
        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }
        
        // 快速登录
        function quickLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            handleLogin(username, password);
        }
        
        // 处理登录
        function handleLogin(username, password) {
            const user = USERS[username];
            
            if (!user) {
                showAlert('用户名不存在', 'error');
                return;
            }
            
            if (user.password !== password) {
                showAlert('密码错误', 'error');
                return;
            }
            
            // 登录成功，保存用户信息
            const userData = {
                username: username,
                name: user.name,
                role: user.role,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('user', JSON.stringify(userData));
            
            showAlert('登录成功，正在跳转...', 'success');
            
            // 延迟跳转
            setTimeout(() => {
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'map-v0.5.html';
                }
            }, 1000);
        }
        
        // 表单提交
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            handleLogin(username, password);
        });
        
        // 检查是否已登录
        window.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const userData = JSON.parse(savedUser);
                // 检查是否过期（7 天）
                const loginTime = new Date(userData.loginTime);
                const now = new Date();
                const diffDays = (now - loginTime) / (1000 * 60 * 60 * 24);
                
                if (diffDays < 7) {
                    showAlert(`欢迎回来，${userData.name}`, 'success');
                    setTimeout(() => {
                        if (userData.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'map-v0.5.html';
                        }
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
